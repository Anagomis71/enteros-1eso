<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maestro de los Números Enteros</title>
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="contenedor">

<h1>🏆 Maestro de los Números Enteros</h1>

<p>Resuelve las operaciones y consigue insignias.</p>

<div id="ejercicio"></div>

<div class="actividad">
	<label for="actividad">Actividad:</label>
	<select id="actividad">
		<option value="dos">Dos números</option>
		<option value="tres">Tres números</option>
	</select>
</div>

<input type="number" id="respuesta">

<div class="opciones">
	<label><input type="checkbox" id="mixto"> Operadores mixtos</label>
</div>

<button onclick="comprobar()">
Comprobar
</button>

<button id="reset" type="button">Reiniciar marcador</button>

<div id="resultado"></div>

<div class="marcador">
<div>Aciertos: <span id="aciertos">0</span></div>
<div>Errores: <span id="errores">0</span></div>
<div>Puntos: <span id="puntos">0</span></div>
</div>

<progress id="barra" value="0" max="30"></progress>

<div id="insignia"></div>

</div>

<script src="script.js"></script>
</body>
</html>
